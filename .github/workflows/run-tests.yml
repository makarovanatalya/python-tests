name: Run tests

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Setup services (review app) and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Setup playwright
        run: playwright install --with-deps

      - name: Lint code with Ruff
        run: ruff check --output-format=github

      - name: Run app
        run: make start-app

      - name: Run api test
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          SERVER: http://localhost:4111/api
          UI_BASE_URL: http://localhost:80
        run: TEST_PROFILE=api make run-docker-container

      - name: Run ui test
        run: TEST_PROFILE=ui make run-docker-container
